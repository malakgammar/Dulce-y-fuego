<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Commandes - DulceYFuego</title>
</head>
<body>
    <h1>Gestion des Commandes</h1>
    <table border="1">
        <thead>
            <tr>
                <th>N° Commande</th>
                <th>Client</th>
                <th>Date</th>
                <th>Statut</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for commande in commandes %}
            <tr>
                <td>{{ commande.id }}</td>
                <td>{{ commande.client }}</td>
                <td>{{ commande.date }}</td>
                <td>{{ commande.statut }}</td>
                <td>{{ commande.total }} DH</td>
            </tr>
            {% empty %}
            <tr><td colspan="5">Aucune commande pour le moment.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
