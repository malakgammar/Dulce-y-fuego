<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Dulce y Fuego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rouge: #C8102E; --rouge-fonce: #8B0A1E;
            --noir: #0A0A0A; --gris-fonce: #1A1A1A;
            --gris-moyen: #2A2A2A; --blanc: #F5F0EB; --blanc-pur: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--noir); color: var(--blanc); font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: var(--noir) !important; border-bottom: 1px solid var(--rouge); padding: 1.2rem 2rem; }
        .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--blanc-pur) !important; }
        .navbar-brand span { color: var(--rouge); }
        .nav-link { color: rgba(245,240,235,0.7) !important; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.3s; }
        .nav-link:hover { color: var(--rouge) !important; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1rem; position: relative; overflow: hidden; }
        .login-wrapper::before { content: ''; position: absolute; top: -30%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(200,16,46,0.08) 0%, transparent 70%); pointer-events: none; }
        .login-wrapper::after { content: ''; position: absolute; bottom: -20%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(200,16,46,0.06) 0%, transparent 70%); pointer-events: none; }
        .login-card { background: var(--gris-fonce); border: 1px solid #2A2A2A; width: 100%; max-width: 480px; padding: 3rem; position: relative; z-index: 1; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--rouge); }
        .brand-deco-text { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: rgba(245,240,235,0.04); position: absolute; top: 2rem; right: 2rem; line-height: 1; user-select: none; }
        .login-tag { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--rouge); display: block; margin-bottom: 0.75rem; }
        .login-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: var(--blanc-pur); line-height: 1.1; margin-bottom: 0.5rem; }
        .login-subtitle { font-size: 0.8rem; font-weight: 300; color: rgba(245,240,235,0.4); margin-bottom: 2rem; }
        .divider { width: 40px; height: 2px; background: var(--rouge); margin-bottom: 2rem; }

        /* RÔLES */
        .role-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,235,0.5); display: block; margin-bottom: 0.75rem; }
        .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
        .role-btn { background: var(--gris-moyen); border: 1px solid #333; color: rgba(245,240,235,0.5); padding: 0.85rem 0.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-align: center; border-radius: 0; }
        .role-btn:hover { border-color: var(--rouge); color: var(--blanc-pur); }
        .role-btn.selected { background: var(--rouge); border-color: var(--rouge); color: var(--blanc-pur); }
        .role-btn .role-icon { display: block; font-size: 1.4rem; margin-bottom: 0.4rem; }
        .role-grid .role-btn:nth-child(5) { grid-column: 1 / -1; }

        /* INFO RÔLE */
        .role-info { background: rgba(200,16,46,0.06); border-left: 2px solid var(--rouge); padding: 0.65rem 0.9rem; font-size: 0.72rem; color: rgba(245,240,235,0.5); margin-bottom: 1.5rem; display: none; }
        .role-info.visible { display: block; }

        /* FORM */
        .form-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,235,0.5); margin-bottom: 0.5rem; }
        .form-control { background: var(--gris-moyen); border: 1px solid #333; border-radius: 0; color: var(--blanc-pur); padding: 0.85rem 1rem; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; transition: border-color 0.3s, box-shadow 0.3s; }
        .form-control:focus { background: var(--gris-moyen); border-color: var(--rouge); box-shadow: 0 0 0 2px rgba(200,16,46,0.15); color: var(--blanc-pur); outline: none; }
        .form-control::placeholder { color: rgba(245,240,235,0.2); font-weight: 300; }
        .input-group-text { background: #333; border: 1px solid #333; border-radius: 0; color: rgba(245,240,235,0.4); font-size: 0.85rem; }
        .btn-login { background: var(--rouge); color: var(--blanc-pur); border: none; border-radius: 0; padding: 0.9rem; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; width: 100%; transition: background 0.3s, transform 0.2s; margin-top: 0.5rem; }
        .btn-login:hover { background: var(--rouge-fonce); color: var(--blanc-pur); transform: translateY(-1px); }
        .btn-login:disabled { background: #2A2A2A; color: rgba(245,240,235,0.2); cursor: not-allowed; transform: none; }
        .alert-error { background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.3); border-left: 3px solid var(--rouge); border-radius: 0; color: #ff6b6b; font-size: 0.8rem; padding: 0.85rem 1rem; margin-bottom: 1.5rem; }
        .register-link { text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #2A2A2A; }
        .register-link p { font-size: 0.75rem; color: rgba(245,240,235,0.35); margin-bottom: 0; }
        .register-link a { color: var(--rouge); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .register-link a:hover { color: #ff6b6b; }
        footer { background: var(--gris-fonce); border-top: 1px solid #2A2A2A; padding: 1.5rem 0; text-align: center; }
        .footer-copy { font-size: 0.7rem; color: rgba(245,240,235,0.2); }
        .footer-copy span { color: var(--rouge); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'menu' %}">Dulce <span>y</span> Fuego</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-deco-text">DyF</div>
        <span class="login-tag">Espace membre</span>
        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Choisissez votre profil puis connectez-vous</p>
        <div class="divider"></div>

        {% if error %}
        <div class="alert-error">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="role" id="role-input" value="">

            <!-- SÉLECTEUR RÔLE -->
            <span class="role-label">Je suis...</span>

            <div class="role-grid">

                <button type="button" class="role-btn"
                    data-role="client"
                    data-info="Espace client · Menu & Commandes">
                    <span class="role-icon"></span>
                    Client
                </button>

                <button type="button" class="role-btn"
                    data-role="serveur"
                    data-info="Espace serveur · Gestion des commandes">
                    <span class="role-icon"></span>
                    Serveur
                </button>

                <button type="button" class="role-btn"
                    data-role="cuisinier"
                    data-info="Espace cuisine · Commandes à préparer">
                    <span class="role-icon"></span>
                    Cuisinier
                </button>

                <button type="button" class="role-btn"
                    data-role="manager"
                    data-info="Espace manager · Statistiques & gestion">
                    <span class="role-icon"></span>
                    Manager
                </button>

            </div>

            <!-- INFO RÔLE -->
            <div class="role-info" id="role-info">
                <span id="role-info-text"></span>
            </div>

            <!-- IDENTIFIANTS -->
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" name="username" class="form-control"
                           placeholder="votre identifiant" required autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-submit" disabled>
                Sélectionnez un profil
            </button>
        </form>

        <div class="register-link">
            <p>Pas encore de compte ? <a href="{% url 'register' %}">Créer un compte</a></p>
        </div>
    </div>
</div>

<footer>
    <p class="footer-copy">© 2026 Dulce <span>y</span> Fuego — Système de gestion</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const roleButtons = document.querySelectorAll('.role-btn');
const roleInput = document.getElementById('role-input');
const infoBox = document.getElementById('role-info');
const infoText = document.getElementById('role-info-text');
const submitBtn = document.getElementById('btn-submit');

roleButtons.forEach(button => {
    button.addEventListener('click', () => {

        // reset
        roleButtons.forEach(b => b.classList.remove('selected'));

        // select
        button.classList.add('selected');

        // set hidden input (UI only)
        roleInput.value = button.dataset.role;

        // info
        infoText.textContent = '→ ' + button.dataset.info;
        infoBox.classList.add('visible');

        // enable submit
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter →';
    });
});
</script>
</body>
</html>
