<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Dulce y Fuego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rouge: #C8102E;
            --rouge-fonce: #8B0A1E;
            --noir: #0A0A0A;
            --gris-fonce: #1A1A1A;
            --gris-moyen: #2A2A2A;
            --blanc: #F5F0EB;
            --blanc-pur: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--noir);
            color: var(--blanc);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: var(--noir) !important;
            border-bottom: 1px solid var(--rouge);
            padding: 1.2rem 2rem;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--blanc-pur) !important;
        }

        .navbar-brand span { color: var(--rouge); }

        .nav-link {
            color: rgba(245,240,235,0.7) !important;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--rouge) !important; }

        /* ── PAGE WRAPPER ── */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200,16,46,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrapper::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200,16,46,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── CARTE LOGIN ── */
        .login-card {
            background: var(--gris-fonce);
            border: 1px solid #2A2A2A;
            width: 100%;
            max-width: 460px;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--rouge);
        }

        .login-tag {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--rouge);
            display: block;
            margin-bottom: 0.75rem;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--blanc-pur);
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(245,240,235,0.4);
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--rouge);
            margin-bottom: 2rem;
        }

        /* ── FORMULAIRE ── */
        .form-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(245,240,235,0.5);
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--gris-moyen);
            border: 1px solid #333;
            border-radius: 0;
            color: var(--blanc-pur);
            padding: 0.85rem 1rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            background: var(--gris-moyen);
            border-color: var(--rouge);
            box-shadow: 0 0 0 2px rgba(200,16,46,0.15);
            color: var(--blanc-pur);
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(245,240,235,0.2);
            font-weight: 300;
        }

        .input-group-text {
            background: #333;
            border: 1px solid #333;
            border-radius: 0;
            color: rgba(245,240,235,0.4);
            font-size: 0.85rem;
        }

        .btn-login {
            background: var(--rouge);
            color: var(--blanc-pur);
            border: none;
            border-radius: 0;
            padding: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.3s, transform 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: var(--rouge-fonce);
            color: var(--blanc-pur);
            transform: translateY(-1px);
        }

        /* ── ERREUR ── */
        .alert-error {
            background: rgba(200,16,46,0.1);
            border: 1px solid rgba(200,16,46,0.3);
            border-left: 3px solid var(--rouge);
            border-radius: 0;
            color: #ff6b6b;
            font-size: 0.8rem;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
        }

        /* ── LIEN INSCRIPTION ── */
        .register-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #2A2A2A;
        }

        .register-link p {
            font-size: 0.75rem;
            color: rgba(245,240,235,0.35);
            margin-bottom: 0;
        }

        .register-link a {
            color: var(--rouge);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #ff6b6b;
            text-decoration: underline;
        }

        /* ── DECO BRAND ── */
        .brand-deco {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-deco-text {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(245,240,235,0.04);
            letter-spacing: 0.1em;
            user-select: none;
            position: absolute;
            top: 2rem;
            right: 2rem;
            line-height: 1;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--gris-fonce);
            border-top: 1px solid #2A2A2A;
            padding: 1.5rem 0;
            text-align: center;
        }

        .footer-copy {
            font-size: 0.7rem;
            color: rgba(245,240,235,0.2);
            letter-spacing: 0.1em;
        }

        .footer-copy span { color: var(--rouge); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'menu' %}">Dulce <span>y</span> Fuego</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="/commandes/">Commandes</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- LOGIN -->
<div class="login-wrapper">
    <div class="login-card">

        <div class="brand-deco-text">DyF</div>

        <span class="login-tag">Espace membre</span>
        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Accédez à votre espace de gestion</p>
        <div class="divider"></div>

        {% if error %}
        <div class="alert-error">
            ⚠ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="votre identifiant"
                        required
                        autocomplete="username"
                    >
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <button type="submit" class="btn-login">
                Se connecter →
            </button>
        </form>

        <div class="register-link">
            <p>Vous n'avez pas encore de compte ?
                <a href="{% url 'register' %}">Créer un compte</a>
            </p>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    <p class="footer-copy">© 2026 Dulce <span>y</span> Fuego — Système de gestion</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
