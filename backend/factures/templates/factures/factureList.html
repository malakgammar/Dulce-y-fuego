<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Factures - DulceYFuego</title>
</head>
<body>
    <h1>Gestion des Factures</h1>
    <table border="1">
        <thead>
            <tr>
                <th>N° Facture</th>
                <th>Client</th>
                <th>Date</th>
                <th>Montant</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for facture in factures %}
            <tr>
                <td>{{ facture.id }}</td>
                <td>{{ facture.client }}</td>
                <td>{{ facture.date }}</td>
                <td>{{ facture.montant }} DH</td>
                <td><a href="/factures/{{ facture.id }}/pdf/">Télécharger PDF</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="5">Aucune facture pour le moment.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
